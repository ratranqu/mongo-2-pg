apiVersion: apps/v1
kind: Deployment
metadata:
  name: ferretdb
  labels:
    app: ferretdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ferretdb
  template:
    metadata:
      labels:
        app: ferretdb
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:18
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready ..."
              until pg_isready -h postgres -p 5432 -U ferretdb 2>/dev/null; do
                sleep 2
              done
              echo "PostgreSQL is ready."
      containers:
        - name: ferretdb
          image: ghcr.io/ferretdb/ferretdb:1.24.2
          ports:
            - containerPort: 27017
              name: mongo
          env:
            - name: FERRETDB_POSTGRESQL_URL
              value: "postgres://ferretdb:ferretdb@postgres:5432/ferretdb"
          readinessProbe:
            tcpSocket:
              port: mongo
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: mongo
            initialDelaySeconds: 30
            periodSeconds: 10
