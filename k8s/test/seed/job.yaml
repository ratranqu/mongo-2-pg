apiVersion: batch/v1
kind: Job
metadata:
  name: seed-mongodb
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-mongodb
          image: mongo:7
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -c
            - |
              echo "Waiting for source MongoDB to be ready ..."
              until mongosh --quiet --norc mongodb://source-mongodb:27017 --eval 'db.runCommand({ping:1})' 2>/dev/null; do
                sleep 2
              done
              echo "MongoDB is ready."
      containers:
        - name: seed
          image: mongo:7
          imagePullPolicy: IfNotPresent
          command:
            - mongosh
            - mongodb://source-mongodb:27017
            - /scripts/seed-data.js
          volumeMounts:
            - name: seed-script
              mountPath: /scripts
      volumes:
        - name: seed-script
          configMap:
            name: seed-data
