name: End-to-End Migration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: mongo2pg-test

      - name: Install MongoDB tools
        run: |
          # Detect Ubuntu codename for apt source
          UBUNTU_CODENAME="$(lsb_release -cs)"
          echo "Ubuntu codename: $UBUNTU_CODENAME"

          # Import MongoDB GPG key
          curl -fsSL https://www.mongodb.org/static/pgp/server-8.0.asc | \
            sudo gpg --yes --dearmor -o /usr/share/keyrings/mongodb-server-8.0.gpg

          echo "deb [ signed-by=/usr/share/keyrings/mongodb-server-8.0.gpg ] https://repo.mongodb.org/apt/ubuntu ${UBUNTU_CODENAME}/mongodb-org/8.0 multiverse" | \
            sudo tee /etc/apt/sources.list.d/mongodb-org-8.0.list

          sudo apt-get update
          sudo apt-get install -y mongodb-mongosh mongodb-database-tools

      - name: Install PostgreSQL client
        run: |
          sudo apt-get install -y postgresql-client

      - name: Verify tools
        run: |
          mongosh --version
          mongodump --version
          mongorestore --version
          psql --version
          kubectl version --client
          kubectl get nodes

      - name: Cache Docker images
        id: docker-cache
        uses: actions/cache@v5
        with:
          path: /tmp/docker-images.tar
          key: docker-images-ferretdb2.7.0-docdb0.107.0-mongo7-pg17

      - name: Load or pull Docker images
        run: |
          IMAGES=(
            "ghcr.io/ferretdb/postgres-documentdb:17-0.107.0-ferretdb-2.7.0"
            "postgres:17"
            "mongo:7"
            "ghcr.io/ferretdb/ferretdb:2.7.0"
          )

          if [[ "${{ steps.docker-cache.outputs.cache-hit }}" == "true" ]]; then
            echo "Loading images from cache ..."
            docker load -i /tmp/docker-images.tar
          else
            echo "Pulling images ..."
            for img in "${IMAGES[@]}"; do
              echo "  Pulling $img ..."
              docker pull "$img"
            done
            echo "Saving images to cache ..."
            docker save "${IMAGES[@]}" -o /tmp/docker-images.tar
          fi

          echo "Loading images into kind cluster ..."
          for img in "${IMAGES[@]}"; do
            kind load docker-image "$img" --name mongo2pg-test
          done
          echo "All images loaded."

      - name: Run end-to-end test
        run: |
          ./test/e2e-test.sh --no-cleanup

      - name: Collect logs on failure
        if: failure()
        run: |
          NAMESPACE="mongo2pg-test"
          echo "=== All Resources ==="
          kubectl get all -n "$NAMESPACE" -o wide || true
          echo ""
          echo "=== Pod Descriptions ==="
          kubectl describe pods -n "$NAMESPACE" || true
          echo ""
          echo "=== Events ==="
          kubectl get events -n "$NAMESPACE" --sort-by='.lastTimestamp' || true
          echo ""
          echo "=== FerretDB Logs ==="
          kubectl logs -l app=ferretdb -n "$NAMESPACE" --all-containers --tail=200 || true
          echo ""
          echo "=== PostgreSQL Logs ==="
          kubectl logs -l app=postgres -n "$NAMESPACE" --all-containers --tail=200 || true
          echo ""
          echo "=== Source MongoDB Logs ==="
          kubectl logs -l app=source-mongodb -n "$NAMESPACE" --all-containers --tail=200 || true
          echo ""
          echo "=== Seed Job Logs ==="
          kubectl logs job/seed-mongodb -n "$NAMESPACE" --all-containers --tail=200 || true

      - name: Cleanup
        if: always()
        run: |
          kubectl delete namespace mongo2pg-test --ignore-not-found --wait=false || true
